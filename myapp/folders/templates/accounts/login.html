{% extends 'base.html' %}
{% block title %}Sign In - MediCare{% endblock %}
{% block content %}
<div class="card" style="max-width: 400px; margin: 3rem auto;">
    <h2>Sign In</h2>
    
    <form method="post" style="margin-top: 2rem;">
        {% csrf_token %}
        <div style="margin-bottom: 1.5rem;">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required>
        </div>
        <div style="margin-bottom: 2rem;">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" style="width: 100%;">Sign In</button>
    </form>
    
    <p style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary);">
        Don't have an account? <a href="{% url 'accounts:signup' %}" style="color: var(--primary); text-decoration: none; font-weight: 500;">Create one</a>
    </p>
</div>
{% endblock %}
