{% extends 'base.html' %}
{% block title %}Doctor Holidays{% endblock %}
{% block content %}
<div class="card">
    <h2>Add Holiday for Dr. {{ doctor.name }}</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save Holiday</button>
    </form>
</div>
{% endblock %}
